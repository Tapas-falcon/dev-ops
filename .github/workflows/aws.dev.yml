name: TestDeploy

on:
  push:
    branches:
      - master # 你想部署的分支
  workflow_dispatch:
    inputs:
      branch: 
        description: 'Branch to build'
        required: true
        default: 'master'

jobs:
  build:
    runs-on: ubuntu-latest

#     env:
#      IMAGE_NAME: beppla1227/tapas-ad-api
#      IMAGE_TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'master' }}

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.AWS_DEV_SSH_KEY }}
          
      - name: Copy docker-compose.yml to EC2
        run: |
          scp -o StrictHostKeyChecking=no docker-compose.yml ${{secrets.AWS_DEV_USERNAME}}@${{secrets.AWS_DEV_DNS}}:/home/${{secrets.AWS_DEV_USERNAME}}/dev-ops/test/

